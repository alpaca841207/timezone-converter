  <path class="land" d="M690 208c54-39 152-45 199-6 32 27 19 65-20 80-26 10-35 36-71 44-43 10-92-4-127-29-41-31-29-67 19-89Z"/>
  <path class="land" d="M757 307c71-24 154 8 185 73 26 56 11 139-33 189-31 35-66 78-119 64-44-12-45-61-68-93-23-34-73-53-66-103 8-63 45-111 101-130Z"/>
  <path class="land" d="M846 179c113-54 287-62 416-10 95 38 142 112 112 181-25 56-91 68-151 55-48-10-93-7-132 26-44 36-111 32-154-4-38-32-54-76-101-88-43-11-83-44-83-86 0-31 33-56 93-74Z"/>
  <path class="land" d="M1032 400c65-2 122 32 144 85 19 47-1 86-47 96-47 11-76-19-91-58-14-36-55-61-38-94 7-16 16-25 32-29Z"/>
  <path class="land" d="M1192 566c66-40 161-31 218 18 40 35 32 83-13 106-65 33-162 11-207-42-24-28-23-65 2-82Z"/>
  <path class="ice" d="M0 684c94-28 202-16 294-19 95-4 172-33 271-23 100 10 160 43 252 42 90 0 160-35 257-28 104 7 188 41 287 31 59-6 116-16 175-2v35H0Z"/>
</svg>
