<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 720" role="img" aria-labelledby="title desc">
  <title id="title">Stylized world map for timezone converter</title>
  <desc id="desc">A polished, recognizable vector world map with ocean, graticules and simplified continent shapes.</desc>
  <defs>
    <linearGradient id="oceanGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b2942"/>
      <stop offset="42%" stop-color="#0c3b5c"/>
      <stop offset="100%" stop-color="#07131f"/>
    </linearGradient>
    <linearGradient id="landGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#bfe8bd"/>
      <stop offset="50%" stop-color="#6da673"/>
      <stop offset="100%" stop-color="#2e5a4b"/>
    </linearGradient>
    <linearGradient id="iceGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#aac6d6"/>
    </linearGradient>
    <filter id="landShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#00101a" flood-opacity=".45"/>
    </filter>
    <pattern id="gridPattern" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <style>
      .land{fill:url(#landGradient);stroke:#d9ffcf;stroke-opacity:.28;stroke-width:2;filter:url(#landShadow)}
      .island{fill:#7fbb78;stroke:#e7ffd5;stroke-opacity:.25;stroke-width:1.4;filter:url(#landShadow)}
      .ice{fill:url(#iceGradient);stroke:#fff;stroke-opacity:.35;stroke-width:2;filter:url(#landShadow)}
      .graticule{fill:none;stroke:#d7f3ff;stroke-opacity:.13;stroke-width:1}
      .label-map{fill:#d7edf8;font:700 18px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:.04em;opacity:.55}
    </style>
  </defs>
  <rect width="1536" height="720" fill="url(#oceanGradient)"/>
  <rect width="1536" height="720" fill="url(#gridPattern)" opacity=".72"/>
  <g opacity=".22">
    <path fill="#74f1ff" d="M0 0h56.5v720H0zM113 0h56.5v720H113zM226 0h56.5v720H226zM339 0h56.5v720H339zM452 0h56.5v720H452zM565 0h56.5v720H565zM678 0h56.5v720H678zM791 0h56.5v720H791zM904 0h56.5v720H904zM1017 0h56.5v720H1017zM1130 0h56.5v720H1130zM1243 0h56.5v720H1243zM1356 0h56.5v720H1356zM1469 0h67v720h-67z"/>
  </g>
  <g>
    <path class="graticule" d="M0 360H1536M0 240H1536M0 480H1536M256 0V720M512 0V720M768 0V720M1024 0V720M1280 0V720"/>
  </g>
