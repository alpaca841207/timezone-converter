<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>世界時區轉換器｜Professional</title>
<style>
:root{
  --bg:#07111c;--panel:#101b28;--panel2:#0c1622;--line:#26384d;--text:#eef6ff;--muted:#9eb0c7;
  --gold:#ffd76a;--blue:#55b7ff;--red:#ff5f6d;--green:#63e6a6;--shadow:0 18px 50px #0009;
}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,#183452 0,#07111c 50%,#050a11 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}button,input,select{font:inherit}.app{max-width:1480px;margin:auto;padding:12px}.top{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 14px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#122236,#0b1521);box-shadow:var(--shadow)}.brand{display:flex;gap:10px;align-items:center}.logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,#24486f,#101c2b);border:1px solid #44617d;font-size:22px}.brand h1{margin:0;font-size:20px;letter-spacing:2px;color:#ffe58a}.toolbar{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.field{height:38px;border-radius:10px;border:1px solid #405773;background:#0d1825;color:var(--text);padding:0 12px;outline:none}.field:focus{border-color:#70c4ff;box-shadow:0 0 0 3px #55b7ff22}.btn{height:38px;border-radius:10px;border:1px solid #48627d;background:#122337;color:var(--text);padding:0 12px;cursor:pointer;font-weight:700}.btn.active,.btn:hover{background:#1e6bbb;border-color:#7fc9ff}.clockbox{font-variant-numeric:tabular-nums;text-align:right;min-width:190px}.clockbox small{display:block;color:var(--muted);font-size:12px}.clockbox strong{font-size:17px}.layout{display:grid;grid-template-columns:1.58fr .92fr;gap:12px;margin-top:12px}.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#101c2b,#07111c);box-shadow:var(--shadow);overflow:hidden}.cardHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);color:#dcecff}.cardHead h2{font-size:15px;margin:0;letter-spacing:1px}.hint{color:var(--muted);font-size:12px}.mapWrap{position:relative;aspect-ratio:16/8.4;min-height:390px;background:#071522;overflow:hidden}.mapSvg{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 6px 22px #0008)}.zone{position:absolute;top:0;bottom:0;border-left:1px solid #ffffff10;cursor:pointer;opacity:.22;transition:.18s}.zone:hover{opacity:.55;background:#8ecbff33}.zone.active{opacity:.74;background:linear-gradient(90deg,#ffd76a22,#ffd76a66,#ffd76a22);box-shadow:inset 0 0 0 2px #ffd76a88}.zoneLabel{position:absolute;bottom:8px;transform:translateX(-50%);font-size:10px;color:#b9c8dc;pointer-events:none}.cityDot{position:absolute;width:10px;height:10px;border-radius:50%;background:#66c7ff;border:2px solid #eaf7ff;transform:translate(-50%,-50%);box-shadow:0 0 0 4px #58bfff28,0 0 16px #58bfff;cursor:pointer;transition:.18s;z-index:5}.cityDot.dim{opacity:.25}.cityDot.active{background:#ff5f6d;border-color:#fff;transform:translate(-50%,-50%) scale(1.7);box-shadow:0 0 0 6px #ff5f6d33,0 0 24px #ff5f6d;z-index:10}.cityLabel{position:absolute;transform:translate(9px,-18px);white-space:nowrap;background:#06101dcc;border:1px solid #ffffff2a;border-radius:999px;padding:3px 8px;font-size:11px;color:#eef6ff;pointer-events:none;opacity:0;transition:.18s;z-index:9}.cityLabel.show{opacity:1}.selected{position:absolute;left:12px;top:12px;z-index:12;background:#06101ddd;border:1px solid #45617e;border-radius:14px;padding:10px 12px;min-width:230px;backdrop-filter:blur(7px)}.selected b{color:#ffe58a}.selected div{font-size:13px;color:var(--muted);margin-top:3px}.side{display:grid;gap:12px}.converter{padding:14px;display:grid;gap:10px}.formrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.result{display:grid;gap:8px;max-height:360px;overflow:auto;padding-right:3px}.timeItem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:9px 10px;border:1px solid #26384d;border-radius:12px;background:#0b1724}.timeItem.active{border-color:#ffd76a;background:#332b1022}.timeItem .name{font-weight:800}.timeItem .meta{color:var(--muted);font-size:12px}.timeItem .time{font-variant-numeric:tabular-nums;color:#dff3ff;font-weight:900}.continents{margin-top:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.continent{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#101c2b,#0a1420);overflow:hidden}.continent h3{margin:0;padding:10px 12px;font-size:14px;color:#ffe58a;border-bottom:1px solid var(--line);background:#111f30}.country{padding:9px 12px;border-bottom:1px solid #ffffff0d}.country:last-child{border-bottom:none}.countryName{font-size:12px;color:#a9bed5;margin-bottom:5px}.cityBtn{display:flex;justify-content:space-between;gap:8px;width:100%;border:0;background:transparent;color:var(--text);padding:6px 0;cursor:pointer;text-align:left}.cityBtn:hover .cityName,.cityBtn.active .cityName{color:#ffd76a}.cityName{font-weight:800}.utc{color:#8fcfff;font-variant-numeric:tabular-nums}.footer{margin-top:10px;color:#7f94ae;font-size:12px;text-align:center}@media(max-width:980px){.top{grid-template-columns:1fr}.clockbox{text-align:left}.layout{grid-template-columns:1fr}.continents{grid-template-columns:1fr 1fr}.mapWrap{min-height:320px}.toolbar{justify-content:flex-start}}@media(max-width:560px){.continents{grid-template-columns:1fr}.formrow{grid-template-columns:1fr}.brand h1{font-size:17px}.mapWrap{min-height:300px}.cityLabel{display:none}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="logo">🌐</div><h1>世界時區轉換器</h1></div>
    <div class="toolbar">
      <input id="search" class="field" placeholder="搜尋城市：巴黎、東京、Kiritimati" />
      <button id="nowBtn" class="btn active">即時</button>
      <button id="fixedBtn" class="btn">指定時間</button>
      <input id="dateTime" class="field" type="datetime-local" style="display:none" />
      <select id="baseCity" class="field"></select>
      <button id="fmtBtn" class="btn">24H</button>
    </div>
    <div class="clockbox"><small>目前本機時間</small><strong id="localNow">--:--:--</strong></div>
  </header>

  <main class="layout">
    <section class="card">
      <div class="cardHead"><h2>互動世界時區地圖</h2><span class="hint">點擊時區帶、城市點，或直接搜尋城市</span></div>
      <div class="mapWrap" id="map">
        <svg class="mapSvg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#102c43"/><stop offset="1" stop-color="#07111c"/></linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect width="1200" height="630" fill="url(#sea)"/>
          <g fill="none" stroke="#2f506c" stroke-width="1" opacity=".45">
            <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
            <path d="M100 0V630M200 0V630M300 0V630M400 0V630M500 0V630M600 0V630M700 0V630M800 0V630M900 0V630M1000 0V630M1100 0V630"/>
          </g>
          <g fill="#173957" stroke="#6e9ec3" stroke-width="2" opacity=".96" filter="url(#glow)">
            <path d="M142 160c35-40 88-58 145-44 42 10 67 39 78 78 15 52-6 91-50 124-30 23-70 38-104 30-50-12-83-61-92-105-7-34 2-61 23-83z"/>
            <path d="M248 350c36-17 77-8 97 27 20 36 13 86-18 122-25 29-52 58-83 59-30 1-55-27-55-60 0-30 22-54 24-82 2-27 10-53 35-66z"/>
            <path d="M520 120c64-28 153-25 205 8 45 29 45 71 12 103-31 30-80 30-126 41-39 9-70 37-113 28-38-8-69-47-65-89 4-41 40-70 87-91z"/>
            <path d="M580 285c48-19 114-14 153 18 38 31 51 79 26 116-27 40-89 49-137 30-43-17-84-47-94-88-8-34 12-61 52-76z"/>
            <path d="M820 145c78-36 164-31 222 4 48 29 54 76 22 111-33 35-95 45-151 39-58-6-111-18-133-57-20-35 1-73 40-97z"/>
            <path d="M930 405c33-33 89-42 128-15 37 26 48 82 20 119-27 37-88 47-128 22-40-25-52-88-20-126z"/>
            <path d="M1030 506c28 6 49 24 46 43-3 19-32 35-62 31-30-4-52-25-47-46 4-21 33-34 63-28z"/>
            <path d="M404 125c26-20 63-20 88-1 22 17 25 43 8 64-20 24-59 28-86 12-31-18-36-53-10-75z"/>
          </g>
          <g fill="#9fc7e7" opacity=".18"><circle cx="142" cy="160" r="2"/><circle cx="678" cy="126" r="2"/><circle cx="941" cy="503" r="2"/><circle cx="320" cy="412" r="2"/><circle cx="1040" cy="514" r="2"/></g>
        </svg>
        <div class="selected" id="selected"><b>請選擇城市或時區</b><div>搜尋會自動高亮城市與所在 UTC 時區。</div></div>
      </div>
    </section>

    <aside class="side">
      <section class="card converter">
        <div class="cardHead" style="padding:0 0 8px;border:0"><h2>時間轉換</h2><span class="hint" id="modeHint">即時更新</span></div>
        <div class="formrow"><select id="filterRegion" class="field"><option value="all">全部洲別</option></select><select id="filterUtc" class="field"><option value="all">全部 UTC</option></select></div>
        <div class="result" id="times"></div>
      </section>
    </aside>
  </main>

  <section class="continents" id="continents"></section>
  <div class="footer">已移除中國、俄羅斯、印尼、菲律賓、馬來西亞與非洲城市；同國同時區顯示首都，多時區以代表大城市呈現。</div>
</div>
<script>
const cities=[
 {city:'東京',country:'日本',continent:'亞洲',utc:9,lat:35.676,lon:139.65,tz:'Asia/Tokyo'},
 {city:'首爾',country:'韓國',continent:'亞洲',utc:9,lat:37.566,lon:126.978,tz:'Asia/Seoul'},
 {city:'新加坡',country:'新加坡',continent:'亞洲',utc:8,lat:1.352,lon:103.82,tz:'Asia/Singapore'},
 {city:'曼谷',country:'泰國',continent:'亞洲',utc:7,lat:13.756,lon:100.501,tz:'Asia/Bangkok'},
 {city:'新德里',country:'印度',continent:'亞洲',utc:5.5,lat:28.614,lon:77.209,tz:'Asia/Kolkata'},
 {city:'臺北',country:'臺灣',continent:'亞洲',utc:8,lat:25.033,lon:121.565,tz:'Asia/Taipei'},
 {city:'倫敦',country:'英國',continent:'歐洲',utc:0,lat:51.507,lon:-0.128,tz:'Europe/London'},
 {city:'巴黎',country:'法國',continent:'歐洲',utc:1,lat:48.857,lon:2.352,tz:'Europe/Paris'},
 {city:'柏林',country:'德國',continent:'歐洲',utc:1,lat:52.52,lon:13.405,tz:'Europe/Berlin'},
 {city:'羅馬',country:'義大利',continent:'歐洲',utc:1,lat:41.903,lon:12.496,tz:'Europe/Rome'},
 {city:'馬德里',country:'西班牙',continent:'歐洲',utc:1,lat:40.416,lon:-3.704,tz:'Europe/Madrid'},
 {city:'阿姆斯特丹',country:'荷蘭',continent:'歐洲',utc:1,lat:52.367,lon:4.904,tz:'Europe/Amsterdam'},
 {city:'蘇黎世',country:'瑞士',continent:'歐洲',utc:1,lat:47.376,lon:8.541,tz:'Europe/Zurich'},
 {city:'斯德哥爾摩',country:'瑞典',continent:'歐洲',utc:1,lat:59.329,lon:18.068,tz:'Europe/Stockholm'},
 {city:'奧斯陸',country:'挪威',continent:'歐洲',utc:1,lat:59.913,lon:10.752,tz:'Europe/Oslo'},
 {city:'雷克雅維克',country:'冰島',continent:'歐洲',utc:0,lat:64.147,lon:-21.942,tz:'Atlantic/Reykjavik'},
 {city:'雪梨',country:'澳洲',continent:'大洋洲',utc:10,lat:-33.868,lon:151.209,tz:'Australia/Sydney'},
 {city:'伯斯',country:'澳洲',continent:'大洋洲',utc:8,lat:-31.953,lon:115.861,tz:'Australia/Perth'},
 {city:'阿德雷德',country:'澳洲',continent:'大洋洲',utc:9.5,lat:-34.928,lon:138.601,tz:'Australia/Adelaide'},
 {city:'聖誕島',country:'澳洲',continent:'大洋洲',utc:7,lat:-10.447,lon:105.69,tz:'Indian/Christmas'},
 {city:'奧克蘭',country:'紐西蘭',continent:'大洋洲',utc:12,lat:-36.848,lon:174.763,tz:'Pacific/Auckland'},
 {city:'Kiritimati',country:'基里巴斯',continent:'大洋洲',utc:14,lat:1.872,lon:-157.427,tz:'Pacific/Kiritimati'},
 {city:'檀香山',country:'美國',continent:'美洲',utc:-10,lat:21.307,lon:-157.858,tz:'Pacific/Honolulu'},
 {city:'洛杉磯',country:'美國',continent:'美洲',utc:-8,lat:34.052,lon:-118.244,tz:'America/Los_Angeles'},
 {city:'鳳凰城',country:'美國',continent:'美洲',utc:-7,lat:33.448,lon:-112.074,tz:'America/Phoenix'},
 {city:'芝加哥',country:'美國',continent:'美洲',utc:-6,lat:41.878,lon:-87.63,tz:'America/Chicago'},
 {city:'紐約',country:'美國',continent:'美洲',utc:-5,lat:40.713,lon:-74.006,tz:'America/New_York'},
 {city:'多倫多',country:'加拿大',continent:'美洲',utc:-5,lat:43.653,lon:-79.383,tz:'America/Toronto'},
 {city:'溫哥華',country:'加拿大',continent:'美洲',utc:-8,lat:49.282,lon:-123.12,tz:'America/Vancouver'},
 {city:'墨西哥城',country:'墨西哥',continent:'美洲',utc:-6,lat:19.432,lon:-99.133,tz:'America/Mexico_City'},
 {city:'聖保羅',country:'巴西',continent:'美洲',utc:-3,lat:-23.55,lon:-46.633,tz:'America/Sao_Paulo'},
 {city:'布宜諾斯艾利斯',country:'阿根廷',continent:'美洲',utc:-3,lat:-34.604,lon:-58.382,tz:'America/Argentina/Buenos_Aires'},
 {city:'聖地牙哥',country:'智利',continent:'美洲',utc:-4,lat:-33.448,lon:-70.669,tz:'America/Santiago'}
];
const order=['亞洲','歐洲','大洋洲','美洲'];
let selectedCity=null,selectedUtc=null,use24=true,live=true,timer=null;
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const fmtUtc=u=>'UTC'+(u===0?'±0':(u>0?'+':'')+String(u).replace('.5',':30'));
const lonToX=lon=>((lon+180)/360)*100;
const latToY=lat=>((90-lat)/180)*100;
function zoneIndex(u){return Math.round((Number(u)+12)*2)}
function displayTime(date,tz){try{return new Intl.DateTimeFormat('zh-TW',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:!use24,month:'2-digit',day:'2-digit'}).format(date)}catch(e){return '--:--'}}
function baseDate(){if(live)return new Date(); const v=$('#dateTime').value; return v?new Date(v):new Date()}
function initMap(){const map=$('#map'); for(let i=-12;i<=14;i+=.5){const z=document.createElement('div');z.className='zone';z.dataset.utc=i;z.style.left=((i+12)/26*100)+'%';z.style.width=(.5/26*100)+'%';z.title=fmtUtc(i);z.addEventListener('click',()=>selectUtc(i));map.appendChild(z)} for(let i=-12;i<=14;i+=2){const l=document.createElement('div');l.className='zoneLabel';l.style.left=((i+12)/26*100)+'%';l.textContent=fmtUtc(i);map.appendChild(l)} cities.forEach(c=>{const d=document.createElement('button');d.className='cityDot';d.type='button';d.dataset.city=c.city;d.style.left=lonToX(c.lon)+'%';d.style.top=latToY(c.lat)+'%';d.title=c.city+'｜'+c.country+'｜'+fmtUtc(c.utc);d.addEventListener('click',e=>{e.stopPropagation();selectCity(c.city)});const lab=document.createElement('div');lab.className='cityLabel';lab.dataset.label=c.city;lab.style.left=lonToX(c.lon)+'%';lab.style.top=latToY(c.lat)+'%';lab.textContent=c.city;map.appendChild(d);map.appendChild(lab);c.dot=d;c.label=lab})}
function initLists(){const base=$('#baseCity'); cities.forEach(c=>base.add(new Option(c.city+'｜'+fmtUtc(c.utc),c.city))); base.value='臺北'; const fr=$('#filterRegion'); order.forEach(r=>fr.add(new Option(r,r))); const fu=$('#filterUtc'); [...new Set(cities.map(c=>c.utc))].sort((a,b)=>a-b).forEach(u=>fu.add(new Option(fmtUtc(u),u))); const wrap=$('#continents'); wrap.innerHTML=''; order.forEach(cont=>{const box=document.createElement('div');box.className='continent';box.innerHTML='<h3>'+cont+'</h3>'; const byCountry={}; cities.filter(c=>c.continent===cont).forEach(c=>{(byCountry[c.country]??=[]).push(c)}); Object.keys(byCountry).sort((a,b)=>a.localeCompare(b,'zh-Hant')).forEach(country=>{const sec=document.createElement('div');sec.className='country';sec.innerHTML='<div class="countryName">'+country+'</div>'; byCountry[country].sort((a,b)=>a.utc-b.utc).forEach(c=>{const btn=document.createElement('button');btn.className='cityBtn';btn.dataset.city=c.city;btn.innerHTML='<span class="cityName">'+c.city+'</span><span class="utc">'+fmtUtc(c.utc)+'</span>';btn.addEventListener('click',()=>selectCity(c.city));sec.appendChild(btn)});box.appendChild(sec)});wrap.appendChild(box)})}
function renderTimes(){const date=baseDate(); $('#localNow').textContent=new Intl.DateTimeFormat('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()); const reg=$('#filterRegion').value, utc=$('#filterUtc').value; let arr=cities.filter(c=>(reg==='all'||c.continent===reg)&&(utc==='all'||String(c.utc)===String(utc))); const html=arr.map(c=>'<div class="timeItem '+(selectedCity===c.city?'active':'')+'" data-city="'+c.city+'"><div><div class="name">'+c.city+'</div><div class="meta">'+c.country+'｜'+c.continent+'｜'+fmtUtc(c.utc)+'</div></div><div class="time">'+displayTime(date,c.tz)+'</div></div>').join(''); $('#times').innerHTML=html; $$('#times .timeItem').forEach(el=>el.addEventListener('click',()=>selectCity(el.dataset.city)))}
function selectCity(name){const c=cities.find(x=>x.city===name); if(!c)return; selectedCity=c.city; selectedUtc=c.utc; updateHighlight(); $('#selected').innerHTML='<b>'+c.city+'</b><div>'+c.country+'｜'+c.continent+'｜'+fmtUtc(c.utc)+'｜'+displayTime(baseDate(),c.tz)+'</div>'; renderTimes()}
function selectUtc(u){selectedCity=null; selectedUtc=Number(u); updateHighlight(); const arr=cities.filter(c=>Number(c.utc)===Number(u)); $('#selected').innerHTML='<b>'+fmtUtc(u)+'</b><div>'+(arr.length?arr.map(c=>c.city).join('、'):'此版本無代表城市')+'</div>'; renderTimes()}
function updateHighlight(){ $$('.zone').forEach(z=>z.classList.toggle('active',selectedUtc!==null&&Number(z.dataset.utc)===Number(selectedUtc))); cities.forEach(c=>{const on=(selectedCity===c.city)||(selectedCity===null&&selectedUtc!==null&&Number(c.utc)===Number(selectedUtc)); const dim=selectedUtc!==null&&!on; c.dot.classList.toggle('active',on); c.dot.classList.toggle('dim',dim); c.label.classList.toggle('show',on)}); $$('.cityBtn').forEach(b=>b.classList.toggle('active',b.dataset.city===selectedCity))}
function searchCity(q){q=q.trim().toLowerCase(); if(!q){selectedCity=null;selectedUtc=null;updateHighlight();return} const c=cities.find(x=>(x.city+x.country+x.continent+fmtUtc(x.utc)).toLowerCase().includes(q)); if(c)selectCity(c.city)}
function bind(){ $('#search').addEventListener('input',e=>searchCity(e.target.value)); $('#nowBtn').addEventListener('click',()=>{live=true;$('#nowBtn').classList.add('active');$('#fixedBtn').classList.remove('active');$('#dateTime').style.display='none';$('#modeHint').textContent='即時更新';renderTimes();}); $('#fixedBtn').addEventListener('click',()=>{live=false;$('#fixedBtn').classList.add('active');$('#nowBtn').classList.remove('active');$('#dateTime').style.display='inline-block'; if(!$('#dateTime').value){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());$('#dateTime').value=d.toISOString().slice(0,16)} $('#modeHint').textContent='指定時間';renderTimes();}); $('#dateTime').addEventListener('change',renderTimes); $('#fmtBtn').addEventListener('click',()=>{use24=!use24;$('#fmtBtn').textContent=use24?'24H':'12H';renderTimes(); if(selectedCity)selectCity(selectedCity)}); $('#filterRegion').addEventListener('change',renderTimes); $('#filterUtc').addEventListener('change',renderTimes); $('#baseCity').addEventListener('change',e=>selectCity(e.target.value)); timer=setInterval(renderTimes,1000)}
function boot(){initMap();initLists();bind();selectCity('臺北');renderTimes()}
document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
