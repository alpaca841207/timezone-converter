<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界時區轉換器</title>

<style>
body {
  margin:0;
  background:#0b1420;
  color:#fff;
  font-family:sans-serif;
}

.topbar{
  padding:10px 20px;
  font-size:18px;
  background:#111c2a;
  border-bottom:1px solid #333;
}

.container{
  display:flex;
  flex-direction:column;
}

.map{
  height:320px;
  background:#1a2a3a;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#888;
}

.search{
  padding:10px;
  background:#111c2a;
}

input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.block{
  background:#111c2a;
  padding:10px;
  border-radius:8px;
}

.city{
  padding:4px;
  cursor:pointer;
}

.city.active{
  background:#2a5cff;
}
</style>
</head>

<body>

<div class="topbar">🌐 時區轉換器</div>

<div class="container">

<div class="map" id="map">
（地圖區域 - 點選城市或搜尋會高亮）
</div>

<div class="search">
<input id="search" placeholder="搜尋城市（例如：巴黎）">
</div>

<div class="grid" id="list"></div>

</div>

<script>

const cities = [

/* 亞洲 */
{c:"東京",country:"日本",utc:9,region:"亞洲"},
{c:"首爾",country:"韓國",utc:9,region:"亞洲"},
{c:"新加坡",country:"新加坡",utc:8,region:"亞洲"},
{c:"曼谷",country:"泰國",utc:7,region:"亞洲"},
{c:"德里",country:"印度",utc:5.5,region:"亞洲"},

/* 歐洲 */
{c:"巴黎",country:"法國",utc:1,region:"歐洲"},
{c:"倫敦",country:"英國",utc:0,region:"歐洲"},
{c:"柏林",country:"德國",utc:1,region:"歐洲"},
{c:"羅馬",country:"義大利",utc:1,region:"歐洲"},
{c:"馬德里",country:"西班牙",utc:1,region:"歐洲"},

/* 北歐 */
{c:"斯德哥爾摩",country:"瑞典",utc:1,region:"北歐"},
{c:"奧斯陸",country:"挪威",utc:1,region:"北歐"},
{c:"雷克雅維克",country:"冰島",utc:0,region:"北歐"},

/* 大洋洲 */
{c:"雪梨",country:"澳洲",utc:10,region:"大洋洲"},
{c:"奧克蘭",country:"紐西蘭",utc:12,region:"大洋洲"},
{c:"聖誕島",country:"澳洲",utc:7,region:"大洋洲"},
{c:"Kiritimati",country:"基里巴斯",utc:14,region:"大洋洲"},

/* 美洲 */
{c:"紐約",country:"美國",utc:-5,region:"美洲"},
{c:"洛杉磯",country:"美國",utc:-8,region:"美洲"},
{c:"芝加哥",country:"美國",utc:-6,region:"美洲"},
{c:"鳳凰城",country:"美國",utc:-7,region:"美洲"},
{c:"檀香山",country:"美國",utc:-10,region:"美洲"},
{c:"多倫多",country:"加拿大",utc:-5,region:"美洲"},
{c:"聖保羅",country:"巴西",utc:-3,region:"美洲"}

];

const list = document.getElementById("list");

function render(){
  list.innerHTML="";
  cities.forEach(city=>{
    const div=document.createElement("div");
    div.className="city";
    div.innerText=`${city.c} (${city.country}) UTC${city.utc}`;
    div.onclick=()=>highlight(city.c);
    list.appendChild(div);
  });
}

function highlight(name){
  document.querySelectorAll(".city").forEach(el=>{
    el.classList.remove("active");
    if(el.innerText.includes(name)){
      el.classList.add("active");
    }
  });
  document.getElementById("map").innerText="已選擇："+name;
}

document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value;
  if(!v) return;
  const found=cities.find(c=>c.c.includes(v));
  if(found) highlight(found.c);
});

render();

</script>

</body>
</html>
