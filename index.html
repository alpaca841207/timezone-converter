<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="互動式世界時區轉換器：搜尋城市會自動在地圖上高亮，點選 UTC 時區可查看主要城市時間。" />
  <title>世界時區轉換器｜互動地圖版</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./src/styles.css" />
  <script defer src="./src/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="世界時區轉換器控制列">
      <div class="brand-mini">
        <div class="brand-icon" aria-hidden="true">◎</div>
        <div>
          <h1>世界時區轉換器</h1>
          <p>WORLD TIME ZONE CONVERTER</p>
        </div>
      </div>

      <div class="top-clock" aria-label="協調世界時">
        <span>協調世界時 UTC</span>
        <strong id="utcNow">--:--:--</strong>
        <small id="utcDate">----</small>
      </div>

      <label class="base-field">
        <span>基準時間</span>
        <input id="baseTime" type="datetime-local" />
      </label>

      <label class="search-box" aria-label="搜尋城市、國家或 UTC">
        <span aria-hidden="true">⌕</span>
        <input id="search" type="search" placeholder="搜尋城市 / 國家 / UTC，例如：巴黎" autocomplete="off" />
        <button id="clearSearchBtn" type="button" aria-label="清除搜尋">×</button>
      </label>

      <div class="button-group" role="group" aria-label="時間模式">
        <button id="liveBtn" class="btn active" type="button">即時</button>
        <button id="convertBtn" class="btn" type="button">指定時間</button>
        <button id="mode24" class="btn ghost" type="button">24h</button>
      </div>
    </header>

    <section class="map-panel" aria-labelledby="mapTitle">
      <div class="map-wrap atlas-map" id="mapWrap">
        <div class="map-title-ribbon" aria-hidden="true">
          <span id="mapTitle">STANDARD TIME ZONES OF THE WORLD</span>
          <small id="selectionSummary">點選 UTC 色帶，或搜尋城市自動高亮</small>
        </div>

        <img
          class="reference-map"
          src="./assets/world-timezone-reference.jpg"
          alt="標準世界時區地圖，包含國家邊界、城市、海洋與 UTC 時區界線"
          draggable="false"
        />

        <svg id="worldMap" class="world-map zone-overlay" viewBox="0 0 1536 828" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <filter id="zoneGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffd966" flood-opacity=".8"/>
            </filter>
            <linearGradient id="selectedZoneGradient" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#ffe88c" stop-opacity=".50"/>
              <stop offset="50%" stop-color="#ffcf4d" stop-opacity=".34"/>
              <stop offset="100%" stop-color="#ff9f43" stop-opacity=".26"/>
            </linearGradient>
          </defs>
          <g id="zoneLayer" aria-label="可點選時區色帶"></g>
        </svg>

        <div id="cityLayer" class="city-layer" aria-label="城市標記"></div>

        <div id="mapHint" class="map-hint">搜尋城市時會直接在地圖上顯示並高亮</div>
      </div>
    </section>

    <main id="continentCards" class="continent-grid" aria-live="polite"></main>

    <footer class="status-bar">
      <span id="statusText">時間依瀏覽器內建 IANA 時區資料計算。</span>
      <span>資料版型：亞洲、歐洲、大洋洲、北美洲、南美洲；已移除中國與俄羅斯城市。</span>
    </footer>
  </div>
</body>
</html>
