<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界時區轉換器</title>
<style>
:root{--bg:#06111d;--panel:#0b1724;--panel2:#101f30;--line:#263d55;--text:#edf5ff;--muted:#9db0c5;--gold:#e7bd4f;--cyan:#79e8ff;--red:#ff5d6c;--green:#9be576}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 80% -10%,#17384a 0,#06111d 45%,#03070d 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
.app{max-width:1800px;margin:auto;padding:14px}
.top{display:grid;grid-template-columns:auto auto auto 1fr auto auto auto;gap:22px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0e1c2b,#08121e);box-shadow:0 14px 40px #0008}
.brand{display:flex;gap:12px;align-items:center;min-width:270px} .logo{font-size:34px;color:var(--gold)} .brand h1{font-size:22px;margin:0;letter-spacing:2px} .brand small{display:block;color:var(--muted);letter-spacing:2px;font-size:12px}
.stat{border-left:1px solid #20384f;padding-left:24px;min-width:150px} .stat label{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:1px} .stat strong{display:block;font-size:26px;font-variant-numeric:tabular-nums} .stat span{color:var(--muted);font-size:14px}
.search{position:relative} .search input{width:100%;height:44px;border-radius:12px;border:1px solid #315175;background:#08121f;color:var(--text);font-size:16px;padding:0 44px 0 42px;outline:none} .search:before{content:'⌕';position:absolute;left:15px;top:9px;color:#b8cbe0;font-size:22px} .clear{position:absolute;right:10px;top:8px;width:28px;height:28px;border-radius:50%;border:0;background:#ffffff22;color:#fff;font-weight:900;cursor:pointer}
button{height:44px;border-radius:12px;border:1px solid #29435d;background:#0f1c2a;color:var(--text);font-weight:900;font-size:15px;padding:0 20px;cursor:pointer} button.primary{background:linear-gradient(180deg,#b38226,#7b5718);border-color:#dbac4d} button.active{outline:2px solid #5fb8ff}
.mapCard{margin-top:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#091522;box-shadow:0 18px 55px #0009} .mapHead{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:linear-gradient(90deg,#7a5e1c,#a48c30,#7d661d);color:#fff4b5;font-weight:900;letter-spacing:2px} .mapWrap{position:relative;background:#050b12;line-height:0} .mapImg{display:block;width:100%;height:auto;user-select:none;filter:saturate(1.08) contrast(1.03)}
.overlay{position:absolute;inset:0;line-height:1} .zone{position:absolute;top:0;bottom:0;border-left:1px solid #5fc4ff33;border-right:1px solid #5fc4ff22;cursor:pointer;transition:.15s;background:transparent} .zone:hover{background:#ffe37a24} .zone.active{background:#ffe56b45;box-shadow:inset 0 0 0 2px #ffe56baa}
.zoneLabel{position:absolute;top:2%;transform:translateX(-50%);font-size:12px;color:#06111d;background:#ffffffe0;border:1px solid #0002;border-radius:6px;padding:2px 6px;font-weight:900;pointer-events:none}
.cityDot{position:absolute;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#ffe66b;border:2px solid #fff;box-shadow:0 0 0 4px #ffe66b40,0 0 16px #ffe66b;cursor:pointer;z-index:5} .cityDot.dim{opacity:.28;filter:grayscale(1)} .cityDot.active{width:24px;height:24px;background:#ff5267;box-shadow:0 0 0 7px #ff526744,0 0 28px #ff5267;z-index:10}
.cityTip{position:absolute;transform:translate(-50%,-120%);background:#08121eea;border:1px solid #ffe66b88;border-radius:10px;padding:7px 10px;white-space:nowrap;font-weight:900;font-size:13px;box-shadow:0 8px 20px #0009;z-index:11;pointer-events:none} .cityTip b{color:#ffe66b}
.hint{position:absolute;right:18px;bottom:18px;background:#07111ccf;border:1px solid #e7bd4f77;border-radius:999px;color:#fff0aa;font-weight:900;padding:8px 14px;line-height:1.2}
.panels{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:14px} .panel{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,#0c1826,#07111b)} .panel h2{margin:0;padding:10px 14px;font-size:19px;letter-spacing:1px} .panel.asia h2{background:linear-gradient(90deg,#f05d83,#ff8a7a)} .panel.europe h2{background:linear-gradient(90deg,#5286ff,#78a3ff)} .panel.oceania h2{background:linear-gradient(90deg,#22b8bd,#75e4dd)} .panel.na h2{background:linear-gradient(90deg,#e58932,#f2b14e)} .panel.sa h2{background:linear-gradient(90deg,#438e46,#79be70)}
.country{padding:9px 12px;border-bottom:1px solid #1c3045} .countryName{font-size:13px;color:#b9c8d7;font-weight:800;margin-bottom:4px} .row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:3px 0;cursor:pointer;border-radius:8px} .row:hover{background:#ffffff0b} .row.active{background:#ffdf5a22;outline:1px solid #ffdf5a55} .row .city{font-weight:800} .time{font-size:18px;font-weight:900;color:#fff1b0;font-variant-numeric:tabular-nums} .utc{font-size:12px;color:#c8d8e8}
.footer{display:flex;justify-content:space-between;color:#8394a8;font-size:12px;padding:10px 4px}
@media (max-width:1200px){.top{grid-template-columns:1fr 1fr}.search{grid-column:1/-1}.panels{grid-template-columns:1fr 1fr}} @media (max-width:700px){.app{padding:8px}.top{grid-template-columns:1fr;gap:10px}.stat{border-left:0;padding-left:0}.panels{grid-template-columns:1fr}.mapHead{font-size:12px}.cityDot{width:12px;height:12px}}
</style>
</head>
<body>
<div class="app">
  <section class="top">
    <div class="brand"><div class="logo">◎</div><div><h1>世界時區轉換器</h1><small>WORLD TIME ZONE CONVERTER</small></div></div>

    <button class="primary" id="nowBtn">即時</button><button id="pickBtn">指定時間</button><button id="fmtBtn">24h</button>
    <input type="datetime-local" id="dt" style="display:none">

function initMap(){ const overlay=$('#overlay'); overlay.innerHTML='';
  for(let z=-12; z<=14; z++){ const band=document.createElement('div'); band.className='zone'; band.dataset.utc=z; let lon0=z*15-7.5, lon1=z*15+7.5; while(lon0 < MAP.lonLeft) { lon0 += 360; lon1 += 360; } while(lon0 >= MAP.lonLeft + MAP.lonSpan) { lon0 -= 360; lon1 -= 360; } const left=((lon0-MAP.lonLeft)/MAP.lonSpan*100); const width=((lon1-lon0)/MAP.lonSpan*100); if(left>-width && left<100){ band.style.left=Math.max(0,left)+'%'; band.style.width=(Math.min(100,left+width)-Math.max(0,left))+'%'; band.title=utcLabel(z); band.onclick=()=>selectZone(z); overlay.appendChild(band); } const lab=document.createElement('div'); lab.className='zoneLabel'; let center=z*15; while(center < MAP.lonLeft) center += 360; while(center >= MAP.lonLeft + MAP.lonSpan) center -= 360; const lx=((center-MAP.lonLeft)/MAP.lonSpan*100); if(lx>=0 && lx<=100){ lab.style.left=lx+'%'; lab.textContent= z===0?'UTC':(z>0?'+'+z:z); overlay.appendChild(lab); } }
  CITIES.forEach((c,i)=>{ const p=project(c.lat,c.lon); const dot=document.createElement('button'); dot.className='cityDot'; dot.dataset.i=i; dot.style.left=p.x+'%'; dot.style.top=p.y+'%'; dot.title=c.name+' '+utcLabel(c.utc); dot.onclick=(ev)=>{ev.stopPropagation(); selectCity(i)}; overlay.appendChild(dot); c.dot=dot; });
}
function groupByContinent(){ const order=['亞洲','歐洲','大洋洲','北美洲','南美洲']; const cls={'亞洲':'asia','歐洲':'europe','大洋洲':'oceania','北美洲':'na','南美洲':'sa'}; const panels=$('#panels'); panels.innerHTML=''; order.forEach(cont=>{ const list=CITIES.filter(c=>c.continent===cont); if(!list.length)return; const panel=document.createElement('div'); panel.className='panel '+cls[cont]; panel.innerHTML='<h2>'+cont+(cont==='歐洲'?' Europe':cont==='亞洲'?' Asia':cont==='大洋洲'?' Oceania':cont==='北美洲'?' North America':' South America')+'</h2>'; const by={}; list.forEach(c=>{(by[c.country]??=[]).push(c)}); Object.keys(by).sort().forEach(country=>{ const box=document.createElement('div'); box.className='country'; box.innerHTML='<div class="countryName">'+by[country][0].flag+' '+country+'</div>'; by[country].sort((a,b)=>a.utc-b.utc).forEach(c=>{ const row=document.createElement('div'); row.className='row'; row.dataset.name=c.name; row.innerHTML='<span class="city">'+c.name+'</span><span class="time" data-tz="'+c.tz+'">--:--</span><span class="utc">'+utcLabel(c.utc)+'</span>'; row.onclick=()=>selectCity(CITIES.indexOf(c)); box.appendChild(row); }); panel.appendChild(box); }); panels.appendChild(panel); }); }
function renderTimes(){ const d=baseDate(); $('#utcClock').textContent=formatTime(d,'UTC',true); $('#utcDate').textContent=formatDate(d,'UTC'); $('#baseTime').textContent=new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:!use24}).format(d); $('#baseZone').textContent=realtime?'即時本機時間':'指定時間'; $$('.time').forEach(el=>el.textContent=formatTime(d,el.dataset.tz)); }
function clearHighlights(){ $$('.zone').forEach(e=>e.classList.remove('active')); $$('.cityDot').forEach(e=>e.classList.remove('active','dim')); $$('.row').forEach(e=>e.classList.remove('active')); $$('.cityTip').forEach(e=>e.remove()); }
function showTip(c){ const p=project(c.lat,c.lon); const tip=document.createElement('div'); tip.className='cityTip'; tip.style.left=p.x+'%'; tip.style.top=p.y+'%'; tip.innerHTML=c.flag+' '+c.name+' <b>'+formatTime(baseDate(),c.tz)+'</b><br><small>'+c.country+' '+utcLabel(c.utc)+'</small>'; $('#overlay').appendChild(tip); }
function selectCity(i){ clearHighlights(); selectedCity=i; const c=CITIES[i]; if(!c)return; c.dot.classList.add('active'); $$('.cityDot').forEach(d=>{if(d!==c.dot)d.classList.add('dim')}); const row=document.querySelector('.row[data-name="'+CSS.escape(c.name)+'"]'); if(row)row.classList.add('active'); const band=$('.zone[data-utc="'+Math.trunc(c.utc)+'"]'); if(band)band.classList.add('active'); showTip(c); $('#status').textContent='已選取：'+c.name+'（'+c.country+'，'+utcLabel(c.utc)+'）'; }
function selectZone(z){ clearHighlights(); selectedZone=z; const band=$('.zone[data-utc="'+z+'"]'); if(band)band.classList.add('active'); const matched=CITIES.filter(c=>Math.trunc(c.utc)===z); CITIES.forEach(c=>{ if(matched.includes(c)) c.dot.classList.add('active'); else c.dot.classList.add('dim'); }); matched.forEach(showTip); $('#status').textContent=utcLabel(z)+'：'+(matched.length?matched.map(c=>c.name).join('、'):'目前無代表城市'); }
function search(q){ q=q.trim().toLowerCase().replace('＋','+'); if(!q){clearHighlights(); $('#status').textContent='點選 UTC 色帶，或搜尋城市自動高亮'; return;} const utc=q.match(/utc\s*([+-−]?\d+(?:\.5|:30|:45)?)/i); if(utc){ let s=utc[1].replace('−','-'); let val=s.includes(':')?parseFloat(s)+0.5:parseFloat(s); selectZone(Math.trunc(val)); return; } const found=CITIES.find(c=>(c.name+c.en+c.country+c.continent+utcLabel(c.utc)).toLowerCase().includes(q)); if(found)selectCity(CITIES.indexOf(found)); }
$('#search').addEventListener('input',e=>search(e.target.value)); $('#clear').onclick=()=>{$('#search').value=''; search('')}; $('#nowBtn').onclick=()=>{realtime=true; $('#nowBtn').classList.add('active'); $('#pickBtn').classList.remove('active'); renderTimes();}; $('#pickBtn').onclick=()=>$('#dt').showPicker ? $('#dt').showPicker() : $('#dt').click(); $('#dt').onchange=e=>{ if(e.target.value){realtime=false; fixedDate=new Date(e.target.value); $('#nowBtn').classList.remove('active'); $('#pickBtn').classList.add('active'); renderTimes();} }; $('#fmtBtn').onclick=()=>{use24=!use24; $('#fmtBtn').textContent=use24?'24h':'12h'; renderTimes(); if(selectedCity!==null)selectCity(selectedCity); else if(selectedZone!==null)selectZone(selectedZone);};
initMap(); groupByContinent(); renderTimes(); setInterval(renderTimes,1000); setTimeout(()=>search('巴黎'),200);
</script>
</body></html>
