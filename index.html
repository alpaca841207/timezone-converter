<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界時區轉換器</title>

<style>
body{
  margin:0;
  background:#0b1420;
  color:#fff;
  font-family:sans-serif;
}

/* 上方 */
.top{
  padding:10px 20px;
  background:#111c2a;
  font-size:18px;
  border-bottom:1px solid #333;
}

/* 地圖 */
.map{
  position:relative;
  height:320px;
  background:#081018;
  overflow:hidden;
}

.zone{
  position:absolute;
  top:0;
  bottom:0;
  width:40px;
  cursor:pointer;
  opacity:.15;
}

.zone:hover{opacity:.4}
.zone.active{background:#ffd54f; opacity:.5}

/* 城市點 */
.dot{
  position:absolute;
  width:8px;
  height:8px;
  background:#4fc3f7;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.dot.active{
  background:#ff5252;
  transform:translate(-50%,-50%) scale(1.5);
}

/* 搜尋 */
.search{
  padding:10px;
  background:#111c2a;
}

input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}

/* 清單 */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.block{
  background:#111c2a;
  padding:10px;
  border-radius:8px;
}

.title{
  margin-bottom:6px;
  font-size:14px;
  color:#aaa;
}

.city{
  padding:4px;
  cursor:pointer;
}

.city.active{
  background:#2a5cff;
}
</style>
</head>

<body>

<div class="top">🌐 時區轉換器</div>

<div class="map" id="map"></div>

<div class="search">
<input id="search" placeholder="搜尋城市（巴黎 / 東京 / 紐約）">
</div>

<div class="grid" id="list"></div>

<script>

/* 城市資料（已套用你規則） */
const cities = [

/* 亞洲 */
{n:"東京",u:9,x:80,y:120,region:"亞洲"},
{n:"首爾",u:9,x:85,y:110,region:"亞洲"},
{n:"曼谷",u:7,x:75,y:150,region:"亞洲"},
{n:"德里",u:5.5,x:70,y:140,region:"亞洲"},
{n:"新加坡",u:8,x:78,y:170,region:"亞洲"},

/* 歐洲 */
{n:"倫敦",u:0,x:45,y:90,region:"歐洲"},
{n:"巴黎",u:1,x:48,y:95,region:"歐洲"},
{n:"柏林",u:1,x:52,y:90,region:"歐洲"},
{n:"羅馬",u:1,x:55,y:105,region:"歐洲"},
{n:"馬德里",u:1,x:43,y:105,region:"歐洲"},

/* 北歐 */
{n:"斯德哥爾摩",u:1,x:55,y:70,region:"北歐"},
{n:"奧斯陸",u:1,x:50,y:70,region:"北歐"},
{n:"雷克雅維克",u:0,x:30,y:60,region:"北歐"},

/* 大洋洲 */
{n:"雪梨",u:10,x:90,y:200,region:"大洋洲"},
{n:"奧克蘭",u:12,x:105,y:210,region:"大洋洲"},
{n:"聖誕島",u:7,x:80,y:190,region:"大洋洲"},
{n:"Kiritimati",u:14,x:115,y:180,region:"大洋洲"},

/* 美洲 */
{n:"紐約",u:-5,x:25,y:110,region:"美洲"},
{n:"芝加哥",u:-6,x:20,y:115,region:"美洲"},
{n:"鳳凰城",u:-7,x:15,y:130,region:"美洲"},
{n:"洛杉磯",u:-8,x:10,y:130,region:"美洲"},
{n:"檀香山",u:-10,x:5,y:170,region:"美洲"},
{n:"多倫多",u:-5,x:25,y:95,region:"美洲"},
{n:"聖保羅",u:-3,x:30,y:170,region:"美洲"}
];

const map = document.getElementById("map");

/* 建立時區帶 */
for(let i=-12;i<=14;i++){
  const z=document.createElement("div");
  z.className="zone";
  z.style.left=(i+12)*6+"%";
  z.onclick=()=>highlightZone(i);
  map.appendChild(z);
}

/* 建立城市點 */
cities.forEach(c=>{
  const d=document.createElement("div");
  d.className="dot";
  d.style.left=c.x+"%";
  d.style.top=c.y+"px";
  d.onclick=()=>selectCity(c.n);
  map.appendChild(d);
  c.el=d;
});

/* 清單 */
const list=document.getElementById("list");

function render(){
  const regions={};
  cities.forEach(c=>{
    if(!regions[c.region]) regions[c.region]=[];
    regions[c.region].push(c);
  });

  list.innerHTML="";
  Object.keys(regions).forEach(r=>{
    const b=document.createElement("div");
    b.className="block";
    b.innerHTML=`<div class="title">${r}</div>`;
    regions[r].forEach(c=>{
      const div=document.createElement("div");
      div.className="city";
      div.innerText=c.n;
      div.onclick=()=>selectCity(c.n);
      b.appendChild(div);
    });
    list.appendChild(b);
  });
}

function selectCity(name){
  document.querySelectorAll(".city").forEach(c=>c.classList.remove("active"));
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));

  const c=cities.find(x=>x.n===name);
  if(!c)return;

  c.el.classList.add("active");
}

function highlightZone(u){
  document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));

  const zones=document.querySelectorAll(".zone");
  zones[u+12].classList.add("active");

  cities.filter(c=>c.u===u).forEach(c=>{
    c.el.classList.add("active");
  });
}

document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value;
  const c=cities.find(x=>x.n.includes(v));
  if(c) selectCity(c.n);
});

render();

</script>

</body>
</html>
